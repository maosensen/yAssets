name: release

# Desktop bundles can't be cross-compiled (notably macOS), so build the full
# platform matrix on GitHub-hosted runners, sign, and upload to ONE draft
# Release. Tag to trigger: `git tag v0.1.0 && git push --tags`.
#
# A single `create-release` job makes the draft first; every matrix job then
# uploads to that same `releaseId`. This avoids the race where each job creates
# its own draft for the tag and assets scatter across duplicate releases.
on:
  push:
    tags: ["v*"]

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      # Checkout so the release body can be pulled from CHANGELOG.md.
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        id: create
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');

            // Release notes = this version's section from CHANGELOG.md (the lines
            // between `## [x.y.z]` and the next `## `). Falls back to GitHub's
            // auto-generated notes if the section is missing, so a forgotten
            // CHANGELOG entry never means an empty release body.
            let body = '';
            try {
              const md = fs.readFileSync('CHANGELOG.md', 'utf8').split('\n');
              const escaped = version.replace(/\./g, '\\.');
              const start = md.findIndex((l) => new RegExp('^## \\[' + escaped + '\\]').test(l));
              if (start !== -1) {
                let end = start + 1;
                while (end < md.length && !md[end].startsWith('## ')) end++;
                body = md.slice(start + 1, end).join('\n').trim();
              }
            } catch (e) {
              core.warning('Could not read CHANGELOG.md: ' + e.message);
            }
            if (!body) core.warning(`No CHANGELOG.md section for ${version}; using GitHub auto-generated notes.`);

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `yAssets ${tag}`,
              body: body || undefined,
              generate_release_notes: body ? false : true,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: "macos-latest", args: "--target aarch64-apple-darwin" }
          - { platform: "macos-latest", args: "--target x86_64-apple-darwin" }
          - { platform: "ubuntu-22.04", args: "" }
          - { platform: "windows-latest", args: "" }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS cross-targets need both arch toolchains.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (generate with `pnpm tauri signer generate`):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization (fill in when ready to distribute):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code-signing (fill in when ready):
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          # Upload to the single release created above (no per-job creation).
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
